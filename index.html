<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bharat AI - Your Intelligent Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">🇮🇳</div>
        <div>
          <h1>Bharat AI</h1>
          <p class="tagline">Your Intelligent Indian Assistant</p>
        </div>
      </div>
      <button id="clearBtn" class="clear-btn" title="Clear chat">🗑️ Clear</button>
    </header>

    <!-- Chat Window -->
    <main id="chatWindow" class="chat-window">
      <div class="welcome">
        <h2>Namaste! 🙏</h2>
        <p>I'm <strong>Bharat AI</strong>, powered by Google Gemini. Ask me anything!</p>
        <div class="suggestions">
          <button class="suggestion">Tell me about Indian culture</button>
          <button class="suggestion">Write a poem in Hindi</button>
          <button class="suggestion">Explain quantum physics simply</button>
          <button class="suggestion">Help me code in Python</button>
        </div>
      </div>
    </main>

    <!-- Input -->
    <footer class="input-area">
      <form id="chatForm" class="chat-form">
        <textarea
          id="userInput"
          placeholder="Ask Bharat AI anything..."
          rows="1"
          required
        ></textarea>
        <button type="submit" id="sendBtn" class="send-btn">
          <span class="send-icon">➤</span>
        </button>
      </form>
      <p class="footer-note">Bharat AI may produce inaccurate information. Verify important facts.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
